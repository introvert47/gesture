<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two-Hand Explicit Control Particle System</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #webcam {
            transform: scaleX(-1);
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 160px;
            height: 120px;
            border-radius: 8px;
            border: 2px solid rgba(255,255,255,0.2);
            z-index: 10;
            object-fit: cover;
        }
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        h1 { margin: 0 0 5px 0; font-size: 1.5rem; letter-spacing: 1px; }
        p { margin: 0; font-size: 0.9rem; opacity: 0.8; line-height: 1.4; }
        .gesture-badge {
            display: inline-block;
            margin-top: 10px;
            padding: 5px 10px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            font-weight: bold;
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="canvas-container"></div>
    <video id="webcam" autoplay playsinline></video>
    
    <div id="ui-overlay">
        <h1>Dual-Hand Particle Engine</h1>
        <p>• <b>Right Hand (Thumb/Index):</b> Controls System Size & Expansion</p>
        <p>• <b>Left Hand (Thumb/Index):</b> Controls Particle Color Spectrum</p>
        <p>• <b>Horizontal Position:</b> Move hand Left ➔ Right to cycle shapes</p>
        <div id="current-shape" class="gesture-badge">Shape: Loading...</div>
    </div>

    <script type="module">
        import * as THREE from 'three';

        // --- System Configuration ---
        const PARTICLE_COUNT = 20000; 
        let scene, camera, renderer, particleSystem, particleGeometry;
        let currentTargetPositions = new Float32Array(PARTICLE_COUNT * 3);
        let basePositions = { heart: [], saturn: [], flower: [], galaxy: [] };
        
        // Interaction System States
        let targetCenter = new THREE.Vector3(0, 0, 0);
        let currentCenter = new THREE.Vector3(0, 0, 0);
        let expansionFactor = 0.0;
        let targetExpansion = 0.0;
        let activeShape = 'saturn';
        let targetHue = 0.6;

        // Stability Filter Buffers
        let shapeDebounceCounter = 0;
        let pendingShape = 'saturn';

        const videoElement = document.getElementById('webcam');
        const shapeBadge = document.getElementById('current-shape');

        // --- 1. Math Templates for Shapes ---
        function generateShapeTemplates() {
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                // Heart Shape
                let t = Math.PI * (2 * Math.random() - 1);
                let phi = Math.PI * (Math.random() - 0.5);
                let hx = 16 * Math.pow(Math.sin(t), 3);
                let hy = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                let hz = phi * 5;
                basePositions.heart.push(hx * 0.15, hy * 0.15, hz * 0.15);

                // Saturn Shape
                if (i < PARTICLE_COUNT * 0.35) {
                    let u = Math.random();
                    let v = Math.random();
                    let theta = u * 2.0 * Math.PI;
                    let phiSat = Math.acos(2.0 * v - 1.0);
                    let r = 1.6 * Math.cbrt(Math.random());
                    basePositions.saturn.push(r * Math.sin(phiSat) * Math.cos(theta), r * Math.sin(phiSat) * Math.sin(theta), r * Math.cos(phiSat));
                } else {
                    let rRing = 2.4 + Math.random() * 2.6;
                    let thetaRing = Math.random() * Math.PI * 2;
                    basePositions.saturn.push(rRing * Math.cos(thetaRing), (Math.random() - 0.5) * 0.12, rRing * Math.sin(thetaRing));
                }

                // Flower Shape
                let thetaFlower = Math.random() * Math.PI * 2;
                let petalCount = 6;
                let rFlower = 3 * Math.sin(petalCount * thetaFlower) + (Math.random() * 0.4);
                basePositions.flower.push(rFlower * Math.cos(thetaFlower), rFlower * Math.sin(thetaFlower), (Math.random() - 0.5) * 0.8);

                // Galaxy Spiral Shape
                let rGal = Math.random() * 5.5;
                let armOffset = (i % 2 === 0) ? 0 : Math.PI; 
                let spiralFactor = 1.8;
                let thetaGal = rGal * spiralFactor + armOffset + (Math.random() - 0.5) * 0.4;
                let yThickness = (Math.random() - 0.5) * 0.8 * Math.exp(-rGal * 0.5);
                
                basePositions.galaxy.push(
                    rGal * Math.cos(thetaGal),
                    yThickness,
                    rGal * Math.sin(thetaGal)
                );
            }
        }

        // --- 2. Initialize Three.js Components ---
        function initThree() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.03);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 3, 12); 

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            generateShapeTemplates();

            particleGeometry = new THREE.BufferGeometry();
            const initialPositions = new Float32Array(basePositions[activeShape]);
            
            particleGeometry.setAttribute('position', new THREE.BufferAttribute(initialPositions, 3));
            
            const colors = new Float32Array(PARTICLE_COUNT * 3);
            particleGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const pTexture = createCircleTexture();

            const particleMaterial = new THREE.PointsMaterial({
                size: 0.16,
                map: pTexture,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                transparent: true,
                vertexColors: true
            });

            particleSystem = new THREE.Points(particleGeometry, particleMaterial);
            scene.add(particleSystem);

            window.addEventListener('resize', onWindowResize);
            updateTargetBuffer(activeShape);
        }

        function createCircleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 32;
            canvas.height = 32;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.2, 'rgba(255,255,255,0.6)');
            gradient.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 32, 32);
            return new THREE.CanvasTexture(canvas);
        }

        function updateTargetBuffer(shapeName) {
            activeShape = shapeName;
            shapeBadge.innerText = `Shape: ${shapeName.toUpperCase()}`;
            const sourceArr = basePositions[shapeName];
            for (let i = 0; i < PARTICLE_COUNT * 3; i++) {
                currentTargetPositions[i] = sourceArr[i];
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- 3. MediaPipe Pipeline Setup ---
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 2, // Track both left and right hands
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults(onHandResults);

        const cameraFeed = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: 320,
            height: 240
        });
        cameraFeed.start();

        // --- 4. Isolated Strict Dual-Hand Engine ---
        function onHandResults(results) {
            // Default reset states if specific hands drop out of camera view
            let rightHandFound = false;
            let leftHandFound = false;

            if (results.multiHandLandmarks && results.multiHandedness) {
                for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                    const landmarks = results.multiHandLandmarks[i];
                    // MediaPipe detects handedness from camera view, let's align it correctly
                    const handType = results.multiHandedness[i].label; 

                    // Capture standard horizontal coordinates for general system center and template routing
                    const mcc = landmarks[9];
                    targetCenter.x = -(mcc.x - 0.5) * 15; 
                    targetCenter.y = -(mcc.y - 0.5) * 10;
                    targetCenter.z = -mcc.z * 15;

                    // Standard template router
                    let calculatedShape = 'saturn';
                    if (mcc.x < 0.28) {
                        calculatedShape = 'heart';
                    } else if (mcc.x >= 0.28 && mcc.x < 0.52) {
                        calculatedShape = 'saturn';
                    } else if (mcc.x >= 0.52 && mcc.x < 0.76) {
                        calculatedShape = 'flower';
                    } else {
                        calculatedShape = 'galaxy';
                    }

                    if (calculatedShape === pendingShape) {
                        shapeDebounceCounter++;
                        if (shapeDebounceCounter > 10 && activeShape !== calculatedShape) {
                            updateTargetBuffer(calculatedShape);
                        }
                    } else {
                        pendingShape = calculatedShape;
                        shapeDebounceCounter = 0;
                    }

                    // Extract pinch distance measurements (Thumb 4 to Index 8)
                    const thumbTip = landmarks[4];
                    const indexTip = landmarks[8];
                    const pinchDist = Math.hypot(thumbTip.x - indexTip.x, thumbTip.y - indexTip.y, thumbTip.z - indexTip.z);

                    // ROUTE ACTIONS BASED ON STRICT LEFT / RIGHT IDENTIFICATION
                    if (handType === 'Right') {
                        rightHandFound = true;
                        // Map right hand pinch size directly: tight pinch = normal size, wide stretch = large scale explosion
                        // Clamped between 0.03 (pinched) and 0.25 (fully open)
                        let normalizedExpansion = (pinchDist - 0.04) * 12.0;
                        targetExpansion = THREE.MathUtils.clamp(normalizedExpansion, 0.0, 3.5);
                    } 
                    
                    if (handType === 'Left') {
                        leftHandFound = true;
                        // Map left hand pinch color directly: tracks open span to rotate color hues around wheel spectrum smoothly
                        let normalizedHue = 0.1 + (pinchDist * 2.5);
                        targetHue = THREE.MathUtils.clamp(normalizedHue, 0.0, 1.0);
                    }
                }
            }

            // Fallback limits if one of the tracking hands completely leaves camera view
            if (!rightHandFound) targetExpansion = 0.0;
            if (!leftHandFound) targetHue = 0.55; // Default back to nice clean blue
        }

        // --- 5. Fluid Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const elapsedTime = clock.getElapsedTime();
            const positions = particleGeometry.attributes.position.array;
            const colors = particleGeometry.attributes.color.array;

            currentCenter.lerp(targetCenter, 0.07);
            expansionFactor += (targetExpansion - expansionFactor) * 0.1;

            // Generate clean dynamic color from hue target shifted by left hand
            const finalColor = new THREE.Color().setHSL(targetHue, 1.0, 0.55);

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;

                let tx = currentTargetPositions[i3];
                let ty = currentTargetPositions[i3 + 1];
                let tz = currentTargetPositions[i3 + 2];

                if (activeShape !== 'galaxy') {
                    tx += Math.sin(elapsedTime * 1.3 + i) * 0.03;
                    ty += Math.cos(elapsedTime * 1.1 + i) * 0.03;
                }

                // Apply size factors governed strictly by right hand calculations
                tx *= (1.0 + expansionFactor);
                ty *= (1.0 + expansionFactor);
                tz *= (1.0 + expansionFactor);

                // Morph vectors smoothly
                positions[i3]     += ((tx + currentCenter.x) - positions[i3]) * 0.07;
                positions[i3 + 1] += ((ty + currentCenter.y) - positions[i3 + 1]) * 0.07;
                positions[i3 + 2] += ((tz + currentCenter.z) - positions[i3 + 2]) * 0.07;

                // Color shifts governed strictly by left hand calculations
                colors[i3]     += (finalColor.r - colors[i3]) * 0.05;
                colors[i3 + 1] += (finalColor.g - colors[i3 + 1]) * 0.05;
                colors[i3 + 2] += (finalColor.b - colors[i3 + 2]) * 0.05;
            }

            particleGeometry.attributes.position.needsUpdate = true;
            particleGeometry.attributes.color.needsUpdate = true;

            particleSystem.rotation.y = elapsedTime * 0.06;

            renderer.render(scene, camera);
        }

        initThree();
        animate();
    </script>
</body>
</html>
