<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D Hand Particle System</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        /* Hidden video element for MediaPipe tracking */
        #webcam {
            display: none;
        }
        /* UI Overlay */
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            color: white;
            pointer-events: none;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        h1 { margin: 0 0 5px 0; font-size: 24px; letter-spacing: 1px; }
        p { margin: 0 0 15px 0; font-size: 14px; color: #ccc; }
        .stat { font-size: 14px; margin-bottom: 5px; font-family: monospace; }
        .badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="ui">
        <h1>Hand-Controlled Particle Sandbox</h1>
        <p>Show your hand to the webcam to interact.</p>
        <div class="stat">Current Shape: <span id="current-shape" class="badge">Loading...</span></div>
        <div class="stat">Pinch Distance (Scale): <span id="pinch-val">0.00</span></div>
    </div>

    <video id="webcam" autoplay playsinline></video>
    <div id="canvas-container"></div>

    <script>
        // --- CONSTANTS & CONFIG ---
        const PARTICLE_COUNT = 15000;
        let currentShapeIndex = 0;
        const shapes = ['SATURN', 'HEART', 'FLOWER', 'FIREWORK'];
        
        // --- THREE.JS SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.015);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.z = 30;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // --- PARTICLE GEOMETRY & BUFFERS ---
        const geometry = new THREE.BufferGeometry();
        
        // Dynamic arrays for current status
        const positions = new Float32Array(PARTICLE_COUNT * 3);
        const colors = new Float32Array(PARTICLE_COUNT * 3);
        
        // Target shape arrays for morphing transitions
        const targetPositions = new Float32Array(PARTICLE_COUNT * 3);
        const targetColors = new Float32Array(PARTICLE_COUNT * 3);
        
        // Random velocities (useful for dynamic explosions/fireworks)
        const velocities = new Float32Array(PARTICLE_COUNT * 3);

        // Initialize base positions at center
        for(let i=0; i < PARTICLE_COUNT * 3; i++) {
            positions[i] = 0;
            colors[i] = 1.0;
            velocities[i] = (Math.random() - 0.5) * 0.2;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        // Round Particle Texture using HTML Canvas
        const createCircleTexture = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 16;
            canvas.height = 16;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(8, 8, 0, 8, 8, 8);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 16, 16);
            return new THREE.CanvasTexture(canvas);
        };

        const material = new THREE.PointsMaterial({
            size: 0.25,
            vertexColors: true,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            map: createCircleTexture()
        });

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        // --- SHAPE GENERATORS (Math Templates) ---
        
        function generateSaturn() {
            const colorObj = new THREE.Color();
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;
                if (i < PARTICLE_COUNT * 0.3) {
                    // The core sphere
                    const u = Math.random();
                    const v = Math.random();
                    const theta = u * 2.0 * Math.PI;
                    const phi = Math.acos(2.0 * v - 1.0);
                    const r = Math.cbrt(Math.random()) * 3.5; 
                    targetPositions[i3] = r * Math.sin(phi) * Math.cos(theta);
                    targetPositions[i3+1] = r * Math.sin(phi) * Math.sin(theta);
                    targetPositions[i3+2] = r * Math.cos(phi);
                    colorObj.setHSL(0.05 + Math.random()*0.05, 0.9, 0.6); // Golden core
                } else {
                    // The rings
                    const r = 5.0 + Math.random() * 6.0;
                    const theta = Math.random() * Math.PI * 2;
                    targetPositions[i3] = r * Math.cos(theta);
                    targetPositions[i3+1] = (Math.random() - 0.5) * 0.3; // Flat thickness
                    targetPositions[i3+2] = r * Math.sin(theta);
                    colorObj.setHSL(0.55 + Math.random()*0.1, 0.8, 0.5); // Cyan/blue rings
                }
                targetColors[i3] = colorObj.r;
                targetColors[i3+1] = colorObj.g;
                targetColors[i3+2] = colorObj.b;
            }
        }

        function generateHeart() {
            const colorObj = new THREE.Color();
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;
                const t = Math.random() * Math.PI * 2;
                // Parametric 3D Heart equations
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                const z = (Math.random() - 0.5) * 10;
                
                const scale = 0.6;
                targetPositions[i3] = x * scale;
                targetPositions[i3+1] = y * scale * 0.9;
                targetPositions[i3+2] = z * scale;

                colorObj.setHSL(0.95 + Math.random()*0.05, 0.9, 0.5 + Math.random()*0.2); // Pink/Red
                targetColors[i3] = colorObj.r;
                targetColors[i3+1] = colorObj.g;
                targetColors[i3+2] = colorObj.b;
            }
        }

        function generateFlower() {
            const colorObj = new THREE.Color();
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);
                // Rose curve formula integrated into sphere scaling
                const petals = 5;
                const r = (2 + Math.sin(petals * theta)) * 3;

                targetPositions[i3] = r * Math.sin(phi) * Math.cos(theta);
                targetPositions[i3+1] = r * Math.sin(phi) * Math.sin(theta);
                targetPositions[i3+2] = r * Math.cos(phi) * 0.3; // slightly flattened

                colorObj.setHSL(0.75 + Math.random()*0.15, 0.9, 0.6); // Purple/Magenta
                targetColors[i3] = colorObj.r;
                targetColors[i3+1] = colorObj.g;
                targetColors[i3+2] = colorObj.b;
            }
        }

        function generateFirework() {
            const colorObj = new THREE.Color();
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;
                // Bursting vectors out from center
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);
                const speed = 2 + Math.random() * 12;

                targetPositions[i3] = speed * Math.sin(phi) * Math.cos(theta);
                targetPositions[i3+1] = speed * Math.sin(phi) * Math.sin(theta);
                targetPositions[i3+2] = speed * Math.cos(phi);

                colorObj.setHSL(Math.random(), 1.0, 0.6); // Dynamic Multicolor
                targetColors[i3] = colorObj.r;
                targetColors[i3+1] = colorObj.g;
                targetColors[i3+2] = colorObj.b;
            }
        }

        // Apply initial template load
        generateSaturn();

        // --- INTERACTION STATE VARIABLES ---
        let targetScale = 1.0;
        let targetX = 0, targetY = 0;
        let lastPinchState = false; // Tracking transitions for switching shapes

        // --- MEDIAPIPE HAND TRACKING SETUP ---
        const videoElement = document.getElementById('webcam');
        
        function onResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const hand = results.multiHandLandmarks[0];
                
                // 1. Position Tracking (Use Wrist landmark [0] or Middle Finger MCP [9])
                // Normalize screen coordinates (-0.5 to 0.5) into Three.js spaces
                targetX = (hand[9].x - 0.5) * -50; // Inverted X for mirror effect
                targetY = (hand[9].y - 0.5) * -30;

                // 2. Gesture Engine: Pinch Tracking (Thumb tip [4] to Index Tip [8])
                const thumb = hand[4];
                const index = hand[8];
                const distance = Math.sqrt(
                    Math.pow(thumb.x - index.x, 2) + 
                    Math.pow(thumb.y - index.y, 2) + 
                    Math.pow(thumb.z - index.z, 2)
                );

                document.getElementById('pinch-val').innerText = distance.toFixed(2);

                // Dynamically map pinch distance to particle scale size expansion
                targetScale = THREE.MathUtils.mapLinear(distance, 0.02, 0.25, 0.3, 3.0);

                // 3. Gesture Engine: Structural Template Swapping
                // Trigger rapid system transformation if a tight deliberate "Pinch & Release" happens
                const isPinching = distance < 0.04;
                if (lastPinchState && !isPinching) {
                    // Trigger shape cycle transition on pinch-release action
                    currentShapeIndex = (currentShapeIndex + 1) % shapes.length;
                    const nextShape = shapes[currentShapeIndex];
                    document.getElementById('current-shape').innerText = nextShape;

                    if(nextShape === 'SATURN') generateSaturn();
                    else if(nextShape === 'HEART') generateHeart();
                    else if(nextShape === 'FLOWER') generateFlower();
                    else if(nextShape === 'FIREWORK') generateFirework();
                }
                lastPinchState = isPinching;
            } else {
                // Return to center gracefully if no hand is detected
                targetX = 0;
                targetY = 0;
                targetScale = 1.0;
            }
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });
        
        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        hands.onResults(onResults);

        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: 640,
            height: 480
        });
        cameraUtils.start();
        document.getElementById('current-shape').innerText = shapes[currentShapeIndex];

        // --- ANIMATION LOOP (Losing Reality Engine) ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            // Smooth Interpolation (Lerp) for Hand Positions & Scales
            particleSystem.position.x += (targetX - particleSystem.position.x) * 0.1;
            particleSystem.position.y += (targetY - particleSystem.position.y) * 0.1;
            
            const currentScale = particleSystem.scale.x;
            const newScale = currentScale + (targetScale - currentScale) * 0.1;
            particleSystem.scale.set(newScale, newScale, newScale);

            // Morphing positions/colors toward the targeted mathematical vectors
            const posAttr = geometry.attributes.position;
            const colAttr = geometry.attributes.color;

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;
                
                // Linear interpolation on particle position vectors towards target map array
                posAttr.array[i3]   += (targetPositions[i3]   - posAttr.array[i3])   * 0.05;
                posAttr.array[i3+1] += (targetPositions[i3+1] - posAttr.array[i3+1]) * 0.05;
                posAttr.array[i3+2] += (targetPositions[i3+2] - posAttr.array[i3+2]) * 0.05;

                // Color Morphing
                colAttr.array[i3]   += (targetColors[i3]   - colAttr.array[i3])   * 0.05;
                colAttr.array[i3+1] += (targetColors[i3+1] - colAttr.array[i3+1]) * 0.05;
                colAttr.array[i3+2] += (targetColors[i3+2] - colAttr.array[i3+2]) * 0.05;
            }
            
            posAttr.needsUpdate = true;
            colAttr.needsUpdate = true;

            // Idle ambient rotation
            particleSystem.rotation.y += 0.005;
            particleSystem.rotation.x = Math.sin(time * 0.2) * 0.2;

            renderer.render(scene, camera);
        }

        animate();

        // --- WINDOW RESIZE ENGINE ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
