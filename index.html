<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Hand-Tracked Particle System</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        /* Hidden webcam video element needed for MediaPipe */
        #webcam {
            transform: scaleX(-1); /* Mirror the video feed */
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 160px;
            height: 120px;
            border-radius: 8px;
            border: 2px solid rgba(255,255,255,0.2);
            z-index: 10;
            object-fit: cover;
        }
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        h1 { margin: 0 0 5px 0; font-size: 1.5rem; letter-spacing: 1px; }
        p { margin: 0; font-size: 0.9rem; opacity: 0.8; line-height: 1.4; }
        .gesture-badge {
            display: inline-block;
            margin-top: 10px;
            padding: 5px 10px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            font-weight: bold;
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="canvas-container"></div>
    <video id="webcam" autoplay playsinline></video>
    
    <div id="ui-overlay">
        <h1>Hand-Controlled Particles</h1>
        <p>• Pinch (Thumb + Index): Explode System</p>
        <p>• 1 Finger Up: Heart Shape</p>
        <p>• 2 Fingers Up: Saturn Shape</p>
        <p>• 3 Fingers Up: Flower Shape</p>
        <p>• 4+ Fingers Up: Fireworks Shape</p>
        <div id="current-shape" class="gesture-badge">Shape: Loading...</div>
    </div>

    <script type="module">
        import * as THREE from 'three';

        // --- System Configuration ---
        const PARTICLE_COUNT = 15000;
        let scene, camera, renderer, particleSystem, particleGeometry;
        let currentTargetPositions = new Float32Array(PARTICLE_COUNT * 3);
        let basePositions = { heart: [], saturn: [], flower: [], fireworks: [] };
        
        // Interaction Tracking State
        let targetCenter = new THREE.Vector3(0, 0, 0);
        let currentCenter = new THREE.Vector3(0, 0, 0);
        let expansionFactor = 0.0;
        let targetExpansion = 0.0;
        let activeShape = 'saturn';
        let colorHue = 0.6; 

        const videoElement = document.getElementById('webcam');
        const shapeBadge = document.getElementById('current-shape');

        // --- 1. Math Templates for Shapes ---
        function generateShapeTemplates() {
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                // Heart Shape Formula
                let t = Math.PI * (2 * Math.random() - 1);
                let phi = Math.PI * (Math.random() - 0.5);
                let hx = 16 * Math.pow(Math.sin(t), 3);
                let hy = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                let hz = phi * 5;
                basePositions.heart.push(hx * 0.15, hy * 0.15, hz * 0.15);

                // Saturn Shape Formula (Sphere Matrix + Plane Ring Matrix)
                if (i < PARTICLE_COUNT * 0.4) {
                    let u = Math.random();
                    let v = Math.random();
                    let theta = u * 2.0 * Math.PI;
                    let phiSat = Math.acos(2.0 * v - 1.0);
                    let r = 1.5 * Math.cbrt(Math.random());
                    basePositions.saturn.push(r * Math.sin(phiSat) * Math.cos(theta), r * Math.sin(phiSat) * Math.sin(theta), r * Math.cos(phiSat));
                } else {
                    let rRing = 2.5 + Math.random() * 2.5;
                    let thetaRing = Math.random() * Math.PI * 2;
                    basePositions.saturn.push(rRing * Math.cos(thetaRing), (Math.random() - 0.5) * 0.1, rRing * Math.sin(thetaRing));
                }

                // Flower Shape Formula (Rose Curve)
                let thetaFlower = Math.random() * Math.PI * 2;
                let petalCount = 5;
                let rFlower = 3 * Math.sin(petalCount * thetaFlower) + (Math.random() * 0.5);
                basePositions.flower.push(rFlower * Math.cos(thetaFlower), rFlower * Math.sin(thetaFlower), (Math.random() - 0.5) * 1);

                // Fireworks Outward Velocity Rays
                let thetaFire = Math.random() * Math.PI * 2;
                let phiFire = Math.acos((Math.random() * 2) - 1);
                let speed = 1.5 + Math.random() * 4.5;
                basePositions.fireworks.push(speed * Math.sin(phiFire) * Math.cos(thetaFire), speed * Math.sin(phiFire) * Math.sin(thetaFire), speed * Math.cos(phiFire));
            }
        }

        // --- 2. Initialize Three.js Components ---
        function initThree() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.035);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.z = 12;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            generateShapeTemplates();

            particleGeometry = new THREE.BufferGeometry();
            const initialPositions = new Float32Array(basePositions[activeShape]);
            
            particleGeometry.setAttribute('position', new THREE.BufferAttribute(initialPositions, 3));
            
            const colors = new Float32Array(PARTICLE_COUNT * 3);
            particleGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const pTexture = createCircleTexture();

            const particleMaterial = new THREE.PointsMaterial({
                size: 0.18,
                map: pTexture,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                transparent: true,
                vertexColors: true
            });

            particleSystem = new THREE.Points(particleGeometry, particleMaterial);
            scene.add(particleSystem);

            window.addEventListener('resize', onWindowResize);
            updateTargetBuffer(activeShape);
        }

        // Generate radial blur textures dynamically via standard canvas
        function createCircleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 32;
            canvas.height = 32;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.2, 'rgba(0,255,255,0.8)');
            gradient.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 32, 32);
            return new THREE.CanvasTexture(canvas);
        }

        function updateTargetBuffer(shapeName) {
            activeShape = shapeName;
            shapeBadge.innerText = `Shape: ${shapeName.toUpperCase()}`;
            const sourceArr = basePositions[shapeName];
            for (let i = 0; i < PARTICLE_COUNT * 3; i++) {
                currentTargetPositions[i] = sourceArr[i];
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- 3. MediaPipe Pipeline Setup ---
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults(onHandResults);

        const cameraFeed = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: 320,
            height: 240
        });
        cameraFeed.start();

        // --- 4. Isolated Gesture Engine ---
        function onHandResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];

                // Set particle cluster anchor to Middle Finger MCP joint (Landmark 9)
                const mcc = landmarks[9];
                targetCenter.x = -(mcc.x - 0.5) * 15; 
                targetCenter.y = -(mcc.y - 0.5) * 10;
                targetCenter.z = -mcc.z * 15;

                // Grab finger landmarks needed to calculate absolute state extensions
                const thumbTip = landmarks[4];
                const indexTip = landmarks[8];
                const indexPip = landmarks[6];
                const middleTip = landmarks[12];
                const middlePip = landmarks[10];
                const ringTip = landmarks[16];
                const ringPip = landmarks[14];
                const pinkyTip = landmarks[20];
                const pinkyPip = landmarks[18];

                // Determine if extended upright by analyzing relative Y coordinates
                const isIndexOpen  = indexTip.y < indexPip.y;
                const isMiddleOpen = middleTip.y < middlePip.y;
                const isRingOpen   = ringTip.y < ringPip.y;
                const isPinkyOpen  = pinkyTip.y < pinkyPip.y;

                // Total open fingers
                let openFingersCount = 0;
                if (isIndexOpen) openFingersCount++;
                if (isMiddleOpen) openFingersCount++;
                if (isRingOpen) openFingersCount++;
                if (isPinkyOpen) openFingersCount++;

                // Strict Euclidean distance for explicit pinch checks
                const pinchDist = Math.hypot(thumbTip.x - indexTip.x, thumbTip.y - indexTip.y, thumbTip.z - indexTip.z);

                // Run structural state router
                if (pinchDist < 0.045) {
                    targetExpansion = 4.5;
                    colorHue = 0.05; // Force bright fire orange color spectrum
                } else {
                    targetExpansion = 0.0;
                    colorHue = 0.4 + (mcc.x * 0.4); // Smoothly shift standard hues across screen space
                    
                    if (openFingersCount === 1 && activeShape !== 'heart') {
                        updateTargetBuffer('heart');
                    } else if (openFingersCount === 2 && activeShape !== 'saturn') {
                        updateTargetBuffer('saturn');
                    } else if (openFingersCount === 3 && activeShape !== 'flower') {
                        updateTargetBuffer('flower');
                    } else if (openFingersCount >= 4 && activeShape !== 'fireworks') {
                        updateTargetBuffer('fireworks');
                    }
                }
            } else {
                // Return safely to baseline coordinates when tracking drops out
                targetCenter.set(0, 0, 0);
                targetExpansion = 0.0;
            }
        }

        // --- 5. Fluid Animation Loop & Matrix Morphing ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const elapsedTime = clock.getElapsedTime();
            const positions = particleGeometry.attributes.position.array;
            const colors = particleGeometry.attributes.color.array;

            // Interpolate position changes using Lerp vectors
            currentCenter.lerp(targetCenter, 0.08);
            expansionFactor += (targetExpansion - expansionFactor) * 0.1;

            const targetColor = new THREE.Color().setHSL(colorHue % 1.0, 1.0, 0.6);

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;

                let tx = currentTargetPositions[i3];
                let ty = currentTargetPositions[i3 + 1];
                let tz = currentTargetPositions[i3 + 2];

                // Continuous subtle ambient drift turbulence
                if (activeShape !== 'fireworks') {
                    tx += Math.sin(elapsedTime * 1.5 + i) * 0.04;
                    ty += Math.cos(elapsedTime * 1.2 + i) * 0.04;
                }

                // Append custom tracking expansion transforms
                tx *= (1.0 + expansionFactor);
                ty *= (1.0 + expansionFactor);
                tz *= (1.0 + expansionFactor);

                // Target position interpolations
                positions[i3]     += ((tx + currentCenter.x) - positions[i3]) * 0.06;
                positions[i3 + 1] += ((ty + currentCenter.y) - positions[i3 + 1]) * 0.06;
                positions[i3 + 2] += ((tz + currentCenter.z) - positions[i3 + 2]) * 0.06;

                // Color interpolations
                colors[i3]     += (targetColor.r - colors[i3]) * 0.03;
                colors[i3 + 1] += (targetColor.g - colors[i3 + 1]) * 0.03;
                colors[i3 + 2] += (targetColor.b - colors[i3 + 2]) * 0.03;
            }

            particleGeometry.attributes.position.needsUpdate = true;
            particleGeometry.attributes.color.needsUpdate = true;

            // Constant passive system orbital spin
            particleSystem.rotation.y = elapsedTime * 0.05;

            renderer.render(scene, camera);
        }

        initThree();
        animate();
    </script>
</body>
</html>
