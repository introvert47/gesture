<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Gesture Particles — Hand Movement Controller</title>
<style>
  :root{
    --bg-0:#05060a;
    --bg-1:#0b0f1a;
    --panel:rgba(12,16,26,0.55);
    --panel-border:rgba(120,170,255,0.18);
    --cyan:#5eead4;
    --violet:#c084fc;
    --amber:#fbbf6b;
    --text-hi:#e8ecf6;
    --text-lo:#8a93ab;
    --mono: 'JetBrains Mono', 'Courier New', monospace;
    --disp: 'Orbitron', 'Segoe UI', sans-serif;
  }
  @font-face{ font-family:'Orbitron'; src:local('Orbitron'); }
  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html,body{
    margin:0; padding:0; width:100%; height:100%; overflow:hidden;
    background: radial-gradient(ellipse at 50% 30%, var(--bg-1) 0%, var(--bg-0) 70%);
    font-family: var(--mono);
    color:var(--text-hi);
    touch-action:none;
    user-select:none;
  }
  #stage{ position:fixed; inset:0; }
  canvas#gl{ display:block; width:100%; height:100%; touch-action:none; }

  .corner{
    position:fixed; width:26px; height:26px; pointer-events:none;
    border-color: var(--cyan); opacity:0.55; z-index:5;
  }
  .corner.tl{ top:14px; left:14px; border-top:2px solid; border-left:2px solid; }
  .corner.tr{ top:14px; right:14px; border-top:2px solid; border-right:2px solid; }
  .corner.bl{ bottom:14px; left:14px; border-bottom:2px solid; border-left:2px solid; }
  .corner.br{ bottom:14px; right:14px; border-bottom:2px solid; border-right:2px solid; }

  #title{
    position:fixed; top:16px; left:50%; transform:translateX(-50%);
    font-family: var(--disp); letter-spacing:0.35em; font-size:11px;
    color: var(--text-hi); opacity:0.75; z-index:6; text-align:center;
    pointer-events:none;
  }
  #title span{ color:var(--cyan); }

  #status{
    position:fixed; top:48px; left:22px; z-index:6;
    background:var(--panel); border:1px solid var(--panel-border);
    border-radius:10px; padding:10px 14px; backdrop-filter: blur(10px);
    font-size:11px; line-height:1.7; color:var(--text-lo); min-width:190px;
  }
  #status b{ color:var(--cyan); font-weight:600; }
  #status .row{ display:flex; justify-content:space-between; gap:14px; }
  #status .val{ color:var(--text-hi); }
  #status .dot{ display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:6px; background:#555; box-shadow:0 0 6px #555; }
  #status .dot.on{ background:var(--cyan); box-shadow:0 0 8px var(--cyan); }

  #camWrap{
    position:fixed; top:48px; right:22px; z-index:6;
    width:168px; height:126px; border-radius:10px; overflow:hidden;
    border:1px solid var(--panel-border); background:#000;
    box-shadow:0 6px 24px rgba(0,0,0,0.5);
  }
  #camWrap video, #camWrap canvas{
    position:absolute; inset:0; width:100%; height:100%;
    transform:scaleX(-1);
  }
  #camLabel{
    position:absolute; bottom:0; left:0; right:0; font-size:9px; text-align:center;
    padding:3px 0; background:rgba(0,0,0,0.55); color:var(--text-lo); letter-spacing:0.08em;
  }

  #dock{
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    z-index:6; display:flex; gap:8px;
    background:var(--panel); border:1px solid var(--panel-border);
    border-radius:14px; padding:8px; backdrop-filter: blur(10px);
  }
  .shapeBtn{
    width:44px; height:44px; border-radius:9px; border:1px solid transparent;
    background:rgba(255,255,255,0.03); color:var(--text-lo);
    font-size:18px; display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:all .18s ease; position:relative;
  }
  .shapeBtn.active{ border-color:var(--cyan); color:var(--cyan); background:rgba(94,234,212,0.10); box-shadow:0 0 14px rgba(94,234,212,0.25); }

  #sliders{
    position:fixed; bottom:20px; right:22px; z-index:6;
    background:var(--panel); border:1px solid var(--panel-border);
    border-radius:10px; padding:12px 14px; backdrop-filter: blur(10px);
    width:168px;
  }
  .sliderRow{ margin-bottom:10px; }
  .sliderRow label{ font-size:9px; color:var(--text-lo); display:flex; justify-content:space-between; }
  .sliderRow input[type=range]{
    width:100%; -webkit-appearance:none; height:3px; border-radius:2px; margin-top:5px;
    background: linear-gradient(90deg, var(--violet), var(--cyan)); outline:none;
  }
  .sliderRow input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; width:12px; height:12px; border-radius:50%; background:#fff; cursor:pointer;
  }

  #startOverlay{
    position:fixed; inset:0; z-index:20; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(ellipse at 50% 40%, #0b0f1a 0%, #05060a 80%);
    flex-direction:column; text-align:center; padding:24px;
  }
  #startOverlay h1{ font-family:var(--disp); font-weight:400; letter-spacing:0.25em; color:var(--text-hi); }
  #startOverlay p{ color:var(--text-lo); font-size:12.5px; max-width:420px; margin-bottom:26px; }
  .bigBtn{
    font-family:var(--mono); font-size:12px; color:var(--text-hi);
    background:rgba(94,234,212,0.08); border:1px solid var(--cyan); border-radius:8px;
    padding:12px 22px; cursor:pointer; transition:all .2s ease;
  }
  .bigBtn:hover{ background:rgba(94,234,212,0.18); box-shadow:0 0 20px rgba(94,234,212,0.3); }

  #toast{
    position:fixed; top:14px; left:50%; transform:translateX(-50%) translateY(-40px);
    z-index:30; background:rgba(12,16,26,0.85); border:1px solid var(--panel-border);
    padding:8px 16px; border-radius:8px; font-size:11px; color:var(--amber);
    opacity:0; transition:all .35s ease; pointer-events:none;
    white-space: nowrap;
  }
  #toast.show{ opacity:1; transform:translateX(-50%) translateY(38px); }

  @media (max-width: 720px){
    #camWrap{ width:120px; height:90px; top:auto; bottom:210px; right:14px; }
    #status{ left:14px; top:44px; min-width:150px; font-size:10px;}
    #sliders{ right:14px; bottom:96px; width:140px; }
    #dock{ bottom:14px; gap:5px; }
    .shapeBtn{ width:38px; height:38px; font-size:15px; }
    #toast.show { transform:translateX(-50%) translateY(140px); }
  }
</style>
</head>
<body>

<div id="stage"><canvas id="gl"></canvas></div>

<div class="corner tl"></div><div class="corner tr"></div>
<div class="corner bl"></div><div class="corner br"></div>

<div id="title">GESTURE <span>//</span> PARTICLE FIELD</div>

<div id="status">
  <div class="row"><span>Input Mode</span><span class="val" id="camState">off</span></div>
  <div class="row"><span><span class="dot" id="dotHand"></span>Action State</span><span class="val" id="handState">—</span></div>
  <div class="row"><span>Trigger</span><span class="val" id="fingerState">Swipe Mode</span></div>
  <div class="row"><span>Current Shape</span><span class="val" id="shapeState">Cross Grid</span></div>
  <div class="row"><span>Particles</span><span class="val" id="countState">—</span></div>
  <div class="row"><span>FPS Matrix</span><span class="val" id="fpsState">—</span></div>
</div>

<div id="camWrap">
  <video id="input_video" playsinline muted autoplay></video>
  <canvas id="overlay"></canvas>
  <div id="camLabel">HAND TRACKING</div>
</div>

<div id="dock"></div>

<div id="sliders">
  <div class="sliderRow">
    <label><span>Expand</span><span id="expLbl">50%</span></label>
    <input type="range" id="expandSlider" min="0" max="100" value="50">
  </div>
  <div class="sliderRow">
    <label><span>Color</span><span id="hueLbl">Hue</span></label>
    <input type="range" id="hueSlider" min="0" max="100" value="60">
  </div>
</div>

<div id="toast"></div>

<div id="startOverlay">
  <h1>HAND MOVEMENT <span>CONTROL</span></h1>
  <p>Swipe your hand quickly left or right to switch shapes. Open/close your palm to zoom, and raise/lower your hand to shift colors.</p>
  <button class="bigBtn" id="btnEnableCam">Start Camera Control</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>

<script>
(function(){
  "use strict";

  const state = {
    shapeIndex: -1, 
    expansion: 0.5,
    hue: 0.6,
    handPresent: false
  };

  const SHAPE_NAMES = ["Orb","Heart","Flower","Saturn","Firework","Galaxy"];
  const SHAPE_ICONS = ["●","♥","✿","◎","✦","✧"];
  const isMobile = /Android|iPhone|iPad|iPod|Mobi/i.test(navigator.userAgent);
  const PARTICLE_COUNT = isMobile ? 5000 : 12000;

  const canvas = document.getElementById('gl');
  const renderer = new THREE.WebGLRenderer({ canvas, alpha:true, antialias:!isMobile, powerPreference:'high-performance' });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);

  const scene = new THREE.Scene();
  const camera3d = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 100);
  camera3d.position.set(0, 0, 13);

  const group = new THREE.Group();
  scene.add(group);

  const rotState = { targetX: 0.2, targetY: 0, currentX: 0.2, currentY: 0 };

  function makeGlowTexture(){
    const size = 64;
    const c = document.createElement('canvas'); c.width=c.height=size;
    const ctx = c.getContext('2d');
    const g = ctx.createRadialGradient(size/2,size/2,0, size/2,size/2,size/2);
    g.addColorStop(0,'rgba(255,255,255,1)');
    g.addColorStop(0.3,'rgba(255,255,255,0.8)');
    g.addColorStop(0.6,'rgba(255,255,255,0.15)');
    g.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle = g; ctx.fillRect(0,0,size,size);
    return new THREE.CanvasTexture(c);
  }

  const N = PARTICLE_COUNT;

  function crossGridShape(){
    const p = new Float32Array(N*3); const half = Math.floor(N / 2);
    for(let i=0; i<N; i++){
      if(i < half) {
        const r = Math.pow(Math.random(), 0.75) * 6.0; const theta = Math.random() * Math.PI * 2;
        p[i*3] = r * Math.cos(theta); p[i*3+1] = (Math.random() - 0.5) * 0.04; p[i*3+2] = r * Math.sin(theta);
      } else {
        const h = (Math.random() - 0.5) * 9.0; const rad = Math.pow(Math.random(), 2.0) * 0.15; const theta = Math.random() * Math.PI * 2;
        p[i*3] = rad * Math.cos(theta); p[i*3+1] = h; p[i*3+2] = rad * Math.sin(theta);
      }
    }
    return p;
  }

  function orbShape(){
    const p = new Float32Array(N*3);
    for(let i=0;i<N;i++){
      const u=Math.random(), v=Math.random(), th = u*Math.PI*2, ph = Math.acos(2*v-1), r = 3.8 * (0.85 + Math.random()*0.15);
      p[i*3] = r*Math.sin(ph)*Math.cos(th); p[i*3+1] = r*Math.sin(ph)*Math.sin(th); p[i*3+2] = r*Math.cos(ph);
    }
    return p;
  }

  function heartShape(){
    const p = new Float32Array(N*3);
    for(let i=0;i<N;i++){
      const t = Math.random()*Math.PI*2, f = 0.4 + 0.6*Math.pow(Math.random(), 0.5); 
      let x = 16*Math.pow(Math.sin(t),3), y = 13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
      p[i*3] = x * f * 0.24; p[i*3+1] = y * f * 0.24 + 0.4; p[i*3+2] = (Math.random()-0.5)*1.2 * (1.0 - f*0.5);
    }
    return p;
  }

  function flowerShape(){
    const p = new Float32Array(N*3);
    for(let i=0;i<N;i++){
      const theta = Math.random()*Math.PI*2, rInner = Math.abs(Math.sin(5 * theta * 0.5)), rad = 4.5 * rInner * (0.3 + 0.7*Math.pow(Math.random(),0.5));
      p[i*3] = rad * Math.cos(theta); p[i*3+1] = Math.sin(rad * 1.5) * 0.4 + (Math.random()-0.5)*0.15; p[i*3+2] = rad * Math.sin(theta);
    }
    return p;
  }

  function saturnShape(){
    const p = new Float32Array(N*3); const coreCount = Math.floor(N*0.35);
    for(let i=0;i<N;i++){
      if (i < coreCount){
        const u=Math.random(), v=Math.random(), th = u*Math.PI*2, ph = Math.acos(2*v-1), r = 1.8 * Math.pow(Math.random(), 0.5);
        p[i*3] = r*Math.sin(ph)*Math.cos(th); p[i*3+1] = r*Math.sin(ph)*Math.sin(th); p[i*3+2] = r*Math.cos(ph);
      } else {
        const rad = 2.8 + Math.pow(Math.random(), 0.5)*2.4, th = Math.random()*Math.PI*2;
        p[i*3] = rad*Math.cos(th); p[i*3+1] = (rad * 0.15) * Math.sin(th * 2) * 0.2 + (Math.random()-0.5)*0.08; p[i*3+2] = rad*Math.sin(th);
      }
    }
    return p;
  }

  function fireworkShape(){
    const p = new Float32Array(N*3); const bursts = 4; const centers = [];
    for(let b=0;b<bursts;b++) centers.push(new THREE.Vector3((Math.random()-0.5)*6, (Math.random()-0.5)*5, (Math.random()-0.5)*4));
    for(let i=0;i<N;i++){
      const c = centers[i % bursts], u=Math.random(), v=Math.random(), th = u*Math.PI*2, ph = Math.acos(2*v-1), r = 2.0 * Math.pow(Math.random(), 0.3);
      p[i*3] = c.x + r*Math.sin(ph)*Math.cos(th); p[i*3+1] = c.y + r*Math.sin(ph)*Math.sin(th); p[i*3+2] = c.z + r*Math.cos(ph);
    }
    return p;
  }

  function galaxyShape(){
    const p = new Float32Array(N*3);
    for(let i=0;i<N;i++){
      const arm = i % 3, t = Math.pow(Math.random(), 0.8), angle = t*Math.PI*6.5 + arm*(Math.PI*2/3) + (Math.random()-0.5)*0.2, radius = t*5.5 + 0.1;
      p[i*3] = radius*Math.cos(angle); p[i*3+1] = (Math.random()-0.5)*0.4*(1-t*0.8); p[i*3+2] = radius*Math.sin(angle);
    }
    return p;
  }

  const SHAPE_FN = [orbShape, heartShape, flowerShape, saturnShape, fireworkShape, galaxyShape];
  const targets = SHAPE_FN.map(fn=>fn());
  const crossTarget = crossGridShape();

  const geometry = new THREE.BufferGeometry();
  const positions = new Float32Array(crossTarget); 
  const targetPositions = new Float32Array(crossTarget);
  const colorsAttr = new Float32Array(N*3); 

  for(let i=0;i<N;i++){
    const v = 0.7 + Math.random()*0.3;
    colorsAttr[i*3] = v; colorsAttr[i*3+1] = v; colorsAttr[i*3+2] = v;
  }

  geometry.setAttribute('position', new THREE.BufferAttribute(positions,3));
  geometry.setAttribute('color', new THREE.BufferAttribute(colorsAttr,3));

  const material = new THREE.PointsMaterial({
    size: isMobile ? 0.15 : 0.10, map: makeGlowTexture(), transparent:true, opacity:0.95, depthWrite:false, blending:THREE.AdditiveBlending, vertexColors:true, sizeAttenuation:true,
  });
  material.color.setHSL(state.hue, 0.85, 0.6);

  const points = new THREE.Points(geometry, material);
  group.add(points);
  document.getElementById('countState').textContent = N.toLocaleString();

  const dock = document.getElementById('dock');
  SHAPE_NAMES.forEach((name,i)=>{
    const b = document.createElement('button'); b.className = 'shapeBtn'; b.innerHTML = SHAPE_ICONS[i];
    b.addEventListener('click', ()=> setShape(i)); dock.appendChild(b);
  });

  function setShape(i){
    if(i === -1) {
      state.shapeIndex = -1; targetPositions.set(crossTarget);
      document.getElementById('shapeState').textContent = "Cross Grid";
      [...dock.children].forEach(el=> el.classList.remove('active'));
      return;
    }
    state.shapeIndex = i;
    targetPositions.set(targets[i]);
    document.getElementById('shapeState').textContent = SHAPE_NAMES[i];
    [...dock.children].forEach((el,idx)=> el.classList.toggle('active', idx===i));
    showToast(SHAPE_ICONS[i] + '  ' + SHAPE_NAMES[i]);
  }

  const expandSlider = document.getElementById('expandSlider');
  const hueSlider = document.getElementById('hueSlider');
  
  function syncExpandUI(){ expandSlider.value = Math.round(state.expansion*100); document.getElementById('expLbl').textContent = Math.round(state.expansion*100)+'%'; }
  function syncHueUI(){ hueSlider.value = Math.round(state.hue*100); document.getElementById('hueLbl').textContent = Math.round(state.hue*360)+'°'; }

  let toastTimer=null;
  function showToast(msg){
    const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
    clearTimeout(toastTimer); toastTimer = setTimeout(()=> t.classList.remove('show'), 1200);
  }

  window.addEventListener('resize', ()=>{
    camera3d.aspect = window.innerWidth/window.innerHeight; camera3d.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);
  });

  function animate(){
    requestAnimationFrame(animate);
    const arr = geometry.attributes.position.array; let changed = false;
    for(let i = 0; i < arr.length; i++) {
      const diff = targetPositions[i] - arr[i];
      if (diff !== 0) { arr[i] += diff * 0.12; changed = true; }
    }
    if(changed) geometry.attributes.position.needsUpdate = true;

    const targetScale = 0.5 + state.expansion * 1.7;
    group.scale.x += (targetScale-group.scale.x)*0.1;
    group.scale.y += (targetScale-group.scale.y)*0.1;
    group.scale.z += (targetScale-group.scale.z)*0.1;

    rotState.currentY += (rotState.targetY - rotState.currentY) * 0.08;
    rotState.currentX += (rotState.targetX - rotState.currentX) * 0.08;
    group.rotation.y = rotState.currentY;
    group.rotation.x = rotState.currentX;

    const curHSL = {h:0,s:0,l:0}; material.color.getHSL(curHSL);
    let dh = state.hue-curHSL.h; if(dh>0.5) dh-=1; if(dh<-0.5) dh+=1;
    material.color.setHSL((curHSL.h + dh*0.1 + 1)%1, 0.85, 0.6);

    renderer.render(scene, camera3d);
  }

  /* Swipe Velocity Engine variables */
  const videoEl = document.getElementById('input_video');
  const overlayCanvas = document.getElementById('overlay');
  const overlayCtx = overlayCanvas.getContext('2d');
  
  let lastX = null;
  let lastTime = null;
  let swipeCooldown = 0;

  function onResults(results){
    overlayCtx.clearRect(0,0,overlayCanvas.width, overlayCanvas.height);
    if(results.multiHandLandmarks && results.multiHandLandmarks.length>0){
      const lm = results.multiHandLandmarks[0];
      const now = performance.now();
      
      if(!state.handPresent) {
        state.handPresent = true; document.getElementById('dotHand').classList.add('on');
        document.getElementById('handState').textContent = 'Tracking Hand'; 
        if(state.shapeIndex === -1) setShape(0); // Default to first shape when hand enters
      }

      overlayCtx.fillStyle = '#5eead4';
      for(const p of lm){ overlayCtx.beginPath(); overlayCtx.arc(p.x*overlayCanvas.width, p.y*overlayCanvas.height, 2, 0, Math.PI*2); overlayCtx.fill(); }

      // SWIPE DETECTION ALGORITHM (Replaces unstable finger counting)
      const currentX = lm[9].x; // Using Middle MCP knuckle coordinate
      if(lastX !== null && lastTime !== null && now > swipeCooldown) {
        const deltaX = currentX - lastX;
        const deltaTime = now - lastTime;
        if(deltaTime > 0) {
          const velocityX = deltaX / deltaTime; // Change in position over time
          
          // Trigger a shift if hand velocity crosses a fast threshold (0.0025)
          if(Math.abs(velocityX) > 0.0025) {
            let nextIndex = state.shapeIndex;
            if(velocityX > 0) {
              nextIndex = (state.shapeIndex + 1) % SHAPE_NAMES.length;
            } else {
              nextIndex = (state.shapeIndex - 1 + SHAPE_NAMES.length) % SHAPE_NAMES.length;
            }
            setShape(nextIndex);
            swipeCooldown = now + 600; // 600ms protection window to avoid multi-triggering
          }
        }
      }
      lastX = currentX;
      lastTime = now;

      // 2. MOVE DETECTED HAND TO ROTATE CLOUD
      const handX = (lm[9].x - 0.5) * 2.5; 
      const handY = (lm[9].y - 0.5) * 2.0; 
      rotState.targetY = -handX; 
      rotState.targetX = handY;

      // 3. COLOR HUE SLIDES BY VERTICAL POSITION
      state.hue = 1.0 - lm[9].y; syncHueUI();

      // 4. CLEAN PINCH SCALE (Safe from index mapping interference now!)
      const handScale = Math.hypot(lm[0].x-lm[9].x, lm[0].y-lm[9].y) || 0.001;
      const pinchRaw = Math.hypot(lm[4].x-lm[8].x, lm[4].y-lm[8].y) / handScale;
      state.expansion = Math.max(0, Math.min(1, (pinchRaw-0.25)/(1.3-0.25))); syncExpandUI();

    } else {
      lastX = null;
      lastTime = null;
      if(state.handPresent) {
        state.handPresent = false; document.getElementById('dotHand').classList.remove('on');
        document.getElementById('handState').textContent = '—';
        setShape(-1); 
        rotState.targetX = 0.2; rotState.targetY = 0;
        showToast('Hand Removed — Snapped to Cross Grid');
      }
    }
  }

  async function startCamera(){
    document.getElementById('camState').textContent = 'Starting cam...';
    try{
      const hands = new Hands({ locateFile: (f)=> `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${f}` });
      hands.setOptions({ maxNumHands: 1, modelComplexity: isMobile ? 0 : 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
      hands.onResults(onResults);

      const camera = new Camera(videoEl, { onFrame: async ()=>{ await hands.send({ image: videoEl }); }, width: 320, height: 240 });
      await camera.start();
      
      document.getElementById('camState').textContent = 'Live tracking';
      overlayCanvas.width = 320; overlayCanvas.height = 240;
      animate(); setShape(-1);
    }catch(err){
      document.getElementById('camState').textContent = 'Blocked';
      alert('Camera initialization error.');
    }
  }

  document.getElementById('btnEnableCam').addEventListener('click', async ()=>{
    document.getElementById('startOverlay').style.display = 'none';
    await startCamera();
  });

  syncExpandUI(); syncHueUI();
})();
</script>
</body>
</html>
