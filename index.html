<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explode & Restore Particles</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: white; font-family: sans-serif; }
        #video-container { position: absolute; top: 10px; left: 10px; width: 240px; height: 180px; z-index: 10; border: 2px solid #fff; border-radius: 8px; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #ui { position: absolute; bottom: 20px; left: 20px; z-index: 10; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
</head>
<body>
    <div id="video-container"><video id="webcam" autoplay playsinline></video></div>
    <div id="ui">
        <h1>Gesture Controls</h1>
        <p>🤏 <b>Pinch:</b> Zoom</p>
        <p>✊ <b>Fist:</b> Explode / Restore</p>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const PARTICLE_COUNT = 8000;
        let isExploded = false;
        let fistTriggered = false;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.z = 30;
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const geometry = new THREE.BufferGeometry();
        // We store "base" positions to restore later
        const basePositions = new Float32Array(PARTICLE_COUNT * 3);
        for(let i=0; i<PARTICLE_COUNT*3; i++) basePositions[i] = (Math.random()-0.5)*20;
        
        geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(basePositions), 3));
        const material = new THREE.PointsMaterial({ size: 0.1, color: 0x00ff88 });
        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, minDetectionConfidence: 0.7 });

        let currentScale = 1;
        let targetRotationX = 0, targetRotationY = 0;

        hands.onResults((results) => {
            if (results.multiHandLandmarks?.length > 0) {
                const l = results.multiHandLandmarks[0];
                
                // Zoom
                const dist = Math.hypot(l[4].x - l[8].x, l[4].y - l[8].y);
                currentScale = 0.5 + (dist * 5);

                // Rotation
                targetRotationY = (l[9].x - 0.5) * 2;
                targetRotationX = (l[9].y - 0.5) * 2;

                // Explode/Restore Toggle
                const fistDist = Math.hypot(l[0].x - l[12].x, l[0].y - l[12].y);
                if (fistDist < 0.2 && !fistTriggered) {
                    fistTriggered = true;
                    isExploded = !isExploded; // Toggle state
                } else if (fistDist >= 0.2) fistTriggered = false;
            }
        });

        const camera_utils = new Camera(document.getElementById('webcam'), { onFrame: async () => await hands.send({image: document.getElementById('webcam')}) });
        camera_utils.start();

        function animate() {
            requestAnimationFrame(animate);
            const pos = geometry.attributes.position.array;
            
            for (let i = 0; i < pos.length; i++) {
                if (isExploded) {
                    // Push particles outward if exploded
                    pos[i] += (Math.random() - 0.5) * 0.5; 
                } else {
                    // Pull particles back to original base positions
                    pos[i] += (basePositions[i] - pos[i]) * 0.1;
                }
            }
            geometry.attributes.position.needsUpdate = true;
            particleSystem.scale.set(currentScale, currentScale, currentScale);
            particleSystem.rotation.x += (targetRotationX - particleSystem.rotation.x) * 0.1;
            particleSystem.rotation.y += (targetRotationY - particleSystem.rotation.y) * 0.1;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
