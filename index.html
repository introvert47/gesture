<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gesture Controlled Particle System</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: white; font-family: sans-serif; }
        canvas { display: block; }
        #video-container { position: absolute; top: 10px; left: 10px; width: 240px; height: 180px; z-index: 10; border: 2px solid #fff; border-radius: 8px; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #ui { position: absolute; bottom: 20px; left: 20px; z-index: 10; pointer-events: none; }
        h1 { margin: 0 0 10px 0; font-size: 1.2rem; }
        p { margin: 5px 0; font-size: 0.9rem; color: #aaa; }
        #current-shape { color: #00ff88; font-weight: bold; }
    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="video-container">
        <video id="webcam" autoplay playsinline></video>
    </div>

    <div id="ui">
        <h1>Gesture Controls</h1>
        <p>🖐️ <b>Move Hand:</b> Rotate Object</p>
        <p>🤏 <b>Pinch:</b> Scale / Expand</p>
        <p>✊ <b>Close Fist:</b> Change Shape & Color</p>
        <p>Current Shape: <span id="current-shape">Sphere</span></p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- Configuration ---
        const PARTICLE_COUNT = 8000;
        let currentShapeIndex = 0;
        const shapes = ['Sphere', 'Heart', 'Saturn', 'Flower'];
        const colors = [0x00ff88, 0xff0055, 0xffbb00, 0x8800ff];
        
        let targetPositions = new Float32Array(PARTICLE_COUNT * 3);
        let fistClosed = false;
        let lastFistToggleTime = 0;

        // --- Three.js Setup ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.02);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 30;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- Particle System ---
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(PARTICLE_COUNT * 3);
        
        // Initialize with random positions (Sphere)
        for(let i = 0; i < PARTICLE_COUNT * 3; i++) {
            positions[i] = (Math.random() - 0.5) * 20;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        
        // Custom Shader Material for better glowing particles
        const material = new THREE.PointsMaterial({
            size: 0.15,
            color: colors[0],
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        // --- Shape Generators ---
        function generateShape(type) {
            const positions = new Float32Array(PARTICLE_COUNT * 3);
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;
                let x, y, z;

                if (type === 'Sphere') {
                    const radius = 10 * Math.cbrt(Math.random());
                    const theta = Math.random() * 2 * Math.PI;
                    const phi = Math.acos(2 * Math.random() - 1);
                    x = radius * Math.sin(phi) * Math.cos(theta);
                    y = radius * Math.sin(phi) * Math.sin(theta);
                    z = radius * Math.cos(phi);
                } 
                else if (type === 'Heart') {
                    // Heart mathematical formula
                    const t = (Math.random() - 0.5) * 2 * Math.PI;
                    const r = 0.5 + Math.random() * 0.5; // Thickness
                    x = r * 16 * Math.pow(Math.sin(t), 3);
                    y = r * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                    z = (Math.random() - 0.5) * 4; 
                }
                else if (type === 'Saturn') {
                    if (Math.random() > 0.4) {
                        // Ring
                        const r = 12 + Math.random() * 8;
                        const theta = Math.random() * 2 * Math.PI;
                        x = r * Math.cos(theta);
                        y = (Math.random() - 0.5) * 0.5; // Flat ring
                        z = r * Math.sin(theta);
                    } else {
                        // Planet
                        const radius = 6 * Math.cbrt(Math.random());
                        const theta = Math.random() * 2 * Math.PI;
                        const phi = Math.acos(2 * Math.random() - 1);
                        x = radius * Math.sin(phi) * Math.cos(theta);
                        y = radius * Math.sin(phi) * Math.sin(theta);
                        z = radius * Math.cos(phi);
                    }
                }
                else if (type === 'Flower') {
                    const theta = Math.random() * 2 * Math.PI;
                    const petals = 5;
                    const r = 15 * Math.cos(petals * theta) * Math.random();
                    x = r * Math.cos(theta);
                    y = r * Math.sin(theta);
                    z = (Math.random() - 0.5) * 2;
                }

                positions[i3] = x;
                positions[i3 + 1] = y;
                positions[i3 + 2] = z;
            }
            return positions;
        }

        // Initialize first shape
        targetPositions = generateShape('Sphere');

        function nextShape() {
            const now = Date.now();
            if (now - lastFistToggleTime < 1000) return; // Cooldown of 1 second
            
            lastFistToggleTime = now;
            currentShapeIndex = (currentShapeIndex + 1) % shapes.length;
            
            const shapeName = shapes[currentShapeIndex];
            document.getElementById('current-shape').innerText = shapeName;
            
            // Generate new targets and change color smoothly
            targetPositions = generateShape(shapeName);
            material.color.setHex(colors[currentShapeIndex]);
        }

        // --- MediaPipe Hand Tracking Setup ---
        const videoElement = document.getElementById('webcam');
        let handScale = 1;
        let targetRotationX = 0;
        let targetRotationY = 0;

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                // 1. Calculate Pinch (Expansion)
                const thumbTip = landmarks[4];
                const indexTip = landmarks[8];
                const distance = Math.hypot(
                    thumbTip.x - indexTip.x,
                    thumbTip.y - indexTip.y,
                    thumbTip.z - indexTip.z
                );
                
                // Map distance to scale (0.05 to 0.3 mapped to 0.5 to 2.5)
                handScale = THREE.MathUtils.lerp(handScale, Math.max(0.5, Math.min(distance * 10, 3)), 0.1);

                // 2. Calculate Rotation based on palm center (landmark 9)
                const palm = landmarks[9];
                targetRotationY = (palm.x - 0.5) * Math.PI * 2;
                targetRotationX = (palm.y - 0.5) * Math.PI * 2;

                // 3. Detect Fist (Change Shape)
                // Compare distance from wrist (0) to middle finger tip (12)
                const wrist = landmarks[0];
                const middleTip = landmarks[12];
                const fistDist = Math.hypot(wrist.x - middleTip.x, wrist.y - middleTip.y);
                
                if (fistDist < 0.25 && !fistClosed) {
                    fistClosed = true;
                    nextShape();
                } else if (fistDist >= 0.25) {
                    fistClosed = false;
                }
            } else {
                // Return to default state smoothly if no hands detected
                handScale = THREE.MathUtils.lerp(handScale, 1, 0.05);
                targetRotationX = THREE.MathUtils.lerp(targetRotationX, 0, 0.05);
                targetRotationY = THREE.MathUtils.lerp(targetRotationY, 0, 0.05);
            }
        });

        const camera_utils = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 320,
            height: 240
        });
        camera_utils.start();

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            // 1. Interpolate particles toward their target positions
            const currentPositions = geometry.attributes.position.array;
            for (let i = 0; i < currentPositions.length; i++) {
                currentPositions[i] += (targetPositions[i] - currentPositions[i]) * 0.05; // 0.05 is the lerp speed
            }
            geometry.attributes.position.needsUpdate = true;

            // 2. Apply Gesture Controls (Scale and Rotation)
            particleSystem.scale.set(handScale, handScale, handScale);
            
            // Smoothly interpolate rotation
            particleSystem.rotation.x += (targetRotationX - particleSystem.rotation.x) * 0.1;
            particleSystem.rotation.y += (targetRotationY - particleSystem.rotation.y) * 0.1;

            // Base gentle auto-rotation
            particleSystem.rotation.y += 0.002;

            renderer.render(scene, camera);
        }

        animate();

        // Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
